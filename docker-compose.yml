services:
  api:
    build:
      context: ./apps/api
    container_name: edugame-api
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./apps/api/uploads:/app/uploads
    ports:
      - "127.0.0.1:${API_PORT:-18000}:8000"
    networks:
      - edugame-network

  web:
    build:
      context: ./apps/web-game
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: edugame-web
    restart: always
    depends_on:
      - api
    ports:
      - "127.0.0.1:${WEB_PORT:-18080}:80"
    networks:
      - edugame-network

networks:
  edugame-network:
    driver: bridge
