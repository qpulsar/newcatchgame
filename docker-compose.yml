services:
  db:
    image: postgres:16-alpine
    container_name: edugame-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-edugame}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edugame123}
      POSTGRES_DB: ${DB_NAME:-edugamedb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edugame-network

  api:
    build:
      context: ./apps/api
    container_name: edugame-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-edugame}:${DB_PASSWORD:-edugame123}@db:5432/${DB_NAME:-edugamedb}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-me}
    volumes:
      - ./apps/api/uploads:/app/uploads
    depends_on:
      - db
    networks:
      - edugame-network
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web-game
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: edugame-web
    restart: always
    depends_on:
      - api
    networks:
      - edugame-network
    ports:
      - "8080:80"

networks:
  edugame-network:
    driver: bridge

volumes:
  postgres_data:
